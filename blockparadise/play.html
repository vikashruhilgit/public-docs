<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Play Block Paradise</title>
<meta name="description" content="Play Block Paradise — the juicy 8×8 block puzzle. Free.">
<!-- Open Graph / social preview (so the link unfurls nicely when shared) -->
<meta property="og:title" content="Play Block Paradise">
<meta property="og:description" content="The juicy 8×8 block puzzle — play free.">
<meta property="og:type" content="website">
<style>
  :root { color-scheme: dark; }
  html,body{margin:0;height:100%;background:#0E0F14;color:#fff;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;}
  .wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px;gap:18px;}
  h1{font-size:30px;margin:0;font-weight:800;}
  h1 .b{color:#FF8A3D;} h1 .p{color:#3B9EFF;}
  p{opacity:.7;margin:0;font-size:15px;}
  .btn{display:inline-block;margin-top:8px;padding:14px 28px;border-radius:14px;background:#3B9EFF;
    color:#fff;text-decoration:none;font-weight:700;font-size:17px;}
  .blocks{display:flex;gap:8px;margin-bottom:6px;}
  .blocks i{width:26px;height:26px;border-radius:7px;display:inline-block;}
</style>
</head>
<body>
<div class="wrap">
  <div class="blocks">
    <i style="background:#FF4D6D"></i><i style="background:#FFD23F"></i>
    <i style="background:#4CD964"></i><i style="background:#3B9EFF"></i><i style="background:#A06BFF"></i>
  </div>
  <h1><span class="b">Block</span> <span class="p">Paradise</span></h1>
  <p id="msg">Taking you to the game…</p>
  <a class="btn" id="cta" href="#">Play free</a>
</div>
<script>
  // ── CONFIG ─────────────────────────────────────────────────────────────
  // Fill these in as each store goes live. Leave a value as "" to fall back
  // to WEB_URL for that platform. NOTHING ELSE needs to change — every share
  // card / QR already in the wild points at THIS page and will start routing
  // to the new store the moment you set the URL here.
  var PLAY_URL = "";   // e.g. "https://play.google.com/store/apps/details?id=com.blockparadise.puzzle"
  var IOS_URL  = "";   // e.g. "https://apps.apple.com/app/idXXXXXXXXXX"
  var WEB_URL  = "https://vikashruhil.itch.io/block-paradise";  // live today (WebGL demo)
  // ───────────────────────────────────────────────────────────────────────

  function pick() {
    var ua = navigator.userAgent || navigator.vendor || "";
    if (/android/i.test(ua))                return PLAY_URL || WEB_URL;
    if (/iPad|iPhone|iPod/i.test(ua) && !window.MSStream) return IOS_URL || WEB_URL;
    return WEB_URL;
  }
  var dest = pick();
  document.getElementById("cta").setAttribute("href", dest);
  // Auto-redirect; the visible button is the fallback if the redirect is blocked.
  try { window.location.replace(dest); } catch (e) { window.location.href = dest; }
</script>
</body>
</html>
